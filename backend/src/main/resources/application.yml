server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: jg-nexus

  datasource:
    url: jdbc:postgresql://localhost:5432/jgnexus
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379
      password:
      timeout: 60000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 10
          min-idle: 2

  cache:
    type: redis
    redis:
      time-to-live: 600000

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
  secret: jgNexusSecretKey2026SuperSecureSigningKeyForJWTTokenGeneration
  expiration: 86400000
  refresh-expiration: 604800000

app:
  cors:
    allowed-origins: http://localhost:3000,http://localhost:5173
  upload:
    dir: ./uploads

logging:
  level:
    com.jgnexus: DEBUG
    org.springframework.security: INFO
