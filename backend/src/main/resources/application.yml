server:
  port: ${PORT:10000}
  servlet:
    context-path: /api

spring:
  application:
    name: jg-nexus

  datasource:
    url: ${DATABASE_URL}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 3
      connection-timeout: 30000

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false

  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}

  cache:
    type: redis

jwt:
  secret: ${JWT_SECRET:jgNexusSecretKey2026}
  expiration: 86400000
  refresh-expiration: 604800000

app:
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:*}
